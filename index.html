<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LOOT CRAWL — a satirical dungeon-crawler loot box generator. The System dispenses. You cope.">
  <title>LOOT CRAWL — a parody loot box generator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="crt" aria-hidden="true"></div>
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <header class="terminal-bar">
    <div class="terminal-head">
      <h1>LOOT CRAWL</h1>
      <button id="sound-toggle" type="button" class="sound-toggle" aria-pressed="false">SOUND: OFF</button>
    </div>
    <p class="tagline">// DUNGEON PROVISIONS INTERFACE v2.0 — The System dispenses. You cope.</p>
  </header>

  <main>
    <section class="box-zone">
      <button id="open-box" type="button" aria-describedby="boxes-opened">OPEN BOX</button>
      <p id="boxes-opened" class="counter" aria-live="polite">Boxes opened: 0</p>
      <button id="sample-batch" type="button" class="dev" hidden>dev: 20 samples</button>
    </section>

    <section id="stage" class="stage" aria-live="polite"></section>

    <section class="collection-zone" aria-labelledby="collection-title">
      <div class="collection-head">
        <h2 id="collection-title">COLLECTION LOG</h2>
        <p id="collection-meta" class="collection-meta"></p>
      </div>
      <div id="rarity-filters" class="filters" role="group" aria-label="Filter collection by rarity">
        <button type="button" data-filter="all" aria-pressed="true">All</button>
        <button type="button" data-filter="trash" aria-pressed="false">Trash</button>
        <button type="button" data-filter="common" aria-pressed="false">Common</button>
        <button type="button" data-filter="uncommon" aria-pressed="false">Uncommon</button>
        <button type="button" data-filter="rare" aria-pressed="false">Rare</button>
        <button type="button" data-filter="epic" aria-pressed="false">Epic</button>
        <button type="button" data-filter="legendary" aria-pressed="false">Legendary</button>
        <button type="button" data-filter="cursed" aria-pressed="false">Cursed</button>
      </div>
      <div id="collection"></div>
      <button id="purge-log" type="button" class="purge">[ PURGE LOG ]</button>
    </section>
  </main>

  <footer>
    <p>A fan-made parody generator inspired by the LitRPG genre. Not affiliated with any book series.</p>
  </footer>

  <!-- Classic scripts in dependency order (not ES modules) so the page
       works when opened directly from file:// — browsers block module
       imports on the file protocol. -->
  <script src="js/tables.js"></script>
  <script src="js/rng.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/store.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
